<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Genera Etichetta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

    :root {
      --bg: #f0f0ed;
      --surface: #ffffff;
      --border: #c8c8c2;
      --border-strong: #888880;
      --text: #1a1a18;
      --text-muted: #666660;
      --accent: #1a1a18;
      --accent-hover: #3a3a38;
      --danger: #c0392b;
      --radius: 4px;
      --font: 'IBM Plex Sans', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── PANNELLO CONTROLLI ── */
    .panel {
      max-width: 560px;
      margin: 0 auto 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
    }

    .fields .full { grid-column: 1 / -1; }

    label {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    input[type="text"] {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    /* ── BOTTONI ── */
    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      grid-column: 1 / -1;
    }

    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* ── ANTEPRIMA ETICHETTA ── */
    .preview-wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    .preview-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    #label {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      position: relative;
    }

    .label-logo {
      position: absolute;
      top: 28px;
      right: 32px;
      height: 36px;
      width: auto;
      max-width: 120px;
      object-fit: contain;
    }

    .label-header h1 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.6;
    }

    .label-header h1 + h1 { margin-top: 2px; }
    .label-header { margin-bottom: 24px; padding-right: 140px; }

    /* ── TABELLA ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--accent);
      color: #fff;
    }

    thead th {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 12px;
      text-align: left;
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f8f6; }

    td {
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    td[contenteditable="true"]:focus {
      background: #fffde8;
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    td[contenteditable="true"]:empty::before {
      content: '—';
      color: var(--border-strong);
    }

    /* ── STAMPA A4 ORIZZONTALE ── */
    @media print {
      @page {
        size: A4 landscape;
        margin: 12mm 15mm;
      }

      body {
        background: white;
        padding: 0;
      }

      .panel,
      .preview-label {
        display: none !important;
      }

      .preview-wrap {
        max-width: 100%;
        margin: 0;
      }

      #label {
        border: none;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .label-logo {
        height: 32px;
      }

      thead tr {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      table { page-break-inside: avoid; }

      td[contenteditable="true"]:empty::before { display: none; }
    }

    /* ── RESPONSIVO MOBILE ── */
    @media (max-width: 480px) {
      .fields {
        grid-template-columns: 1fr;
      }
      .fields .full { grid-column: 1; }

      .actions {
        grid-template-columns: 1fr;
      }

      .btn-primary { grid-column: 1; }

      .panel { padding: 16px; }

      #label { padding: 16px; }

      .label-header { padding-right: 80px; }

      .label-logo {
        height: 26px;
        top: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- PANNELLO CONTROLLI -->
  <div class="panel" id="controls">
    <div class="panel-title">Impostazioni etichetta</div>
    <div class="fields">
      <label class="full">
        <span>Azienda</span>
        <input type="text" id="company" value="UTEK SRL" />
      </label>
      <label>
        <span>DDT No</span>
        <input type="text" id="ddtNo" placeholder="es. 2024/001" />
      </label>
      <label>
        <span>Pallet No</span>
        <input type="text" id="palletNo" placeholder="es. 01" />
      </label>
      <label class="full">
        <span>Logo URL</span>
        <input type="text" id="logoUrl" value="https://www.utekvision.com/pub/media/logo/default/logo_utek_1.png" />
      </label>
    </div>
    <div class="actions">
      <button class="btn" onclick="app.updateLabel()">↺ Aggiorna</button>
      <button class="btn" onclick="app.addRow()">+ Riga</button>
      <button class="btn btn-danger" onclick="app.removeLastRow()">− Ultima riga</button>
      <button class="btn btn-primary" onclick="app.print()">⎙ Stampa (A4 orizzontale)</button>
    </div>
  </div>

  <!-- ANTEPRIMA -->
  <div class="preview-wrap">
    <div class="preview-label">Anteprima etichetta</div>
    <div id="label">
      <img src="https://www.utekvision.com/pub/media/logo/default/logo_utek_1.png" alt="Logo" class="label-logo" id="logoImg">
      <div class="label-header">
        <h1 id="companyDisplay">UTEK SRL</h1>
        <h1>DDT NO: <span id="ddtNoDisplay"></span></h1>
        <h1>PALLET NO: <span id="palletNoDisplay"></span></h1>
      </div>
      <table>
        <thead>
          <tr>
            <th>Pallet No</th>
            <th>Article No</th>
            <th>Quantity</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const app = {
      config: { defaultRows: 5 },

      el: {
        ddtNo:         () => document.getElementById('ddtNo'),
        palletNo:      () => document.getElementById('palletNo'),
        company:       () => document.getElementById('company'),
        logoUrl:       () => document.getElementById('logoUrl'),
        companyDisplay:() => document.getElementById('companyDisplay'),
        ddtNoDisplay:  () => document.getElementById('ddtNoDisplay'),
        palletNoDisplay:()=> document.getElementById('palletNoDisplay'),
        tableBody:     () => document.getElementById('tableBody'),
        logoImg:       () => document.getElementById('logoImg'),
      },

      init() {
        for (let i = 0; i < this.config.defaultRows; i++) this.addRow();
      },

      updateLabel() {
        this.el.companyDisplay().textContent  = this.el.company().value;
        this.el.ddtNoDisplay().textContent    = this.el.ddtNo().value;
        this.el.palletNoDisplay().textContent = this.el.palletNo().value;
        const src = this.el.logoUrl().value.trim();
        if (src) this.el.logoImg().src = src;
      },

      addRow() {
        const row = document.createElement('tr');
        // 3 colonne visibili
        for (let i = 0; i < 3; i++) {
          const td = document.createElement('td');
          td.contentEditable = 'true';
          row.appendChild(td);
        }
        this.el.tableBody().appendChild(row);
      },

      removeLastRow() {
        const tbody = this.el.tableBody();
        if (tbody.rows.length > 0) tbody.deleteRow(tbody.rows.length - 1);
      },

      validateInputs() {
        const ddt    = this.el.ddtNo().value.trim();
        const pallet = this.el.palletNo().value.trim();
        if (!ddt || !pallet) {
          alert('Compila i campi DDT NO e PALLET NO prima di stampare.');
          return false;
        }
        return true;
      },

      print() {
        if (!this.validateInputs()) return;
        this.updateLabel();
        window.print();
      }
    };

    window.onload = () => app.init();
  </script>
</body>
</html>
